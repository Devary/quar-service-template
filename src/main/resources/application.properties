quarkus.http.port=5555
%dev.quarkus.http.port=5555
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.vault.devservices.enabled=false

# Local development config (kept as Maven-filtered values)
%local.quarkus.datasource.db-kind=@quarkus.datasource.db-kind.pg@
%local.quarkus.datasource.username=@quarkus.datasource.username.pg@
%local.quarkus.datasource.password=@quarkus.datasource.password.pg@
%local.quarkus.datasource.reactive.url=@quarkus.datasource.reactive.url.pg@
%local.quarkus.datasource.reactive.max-size=@quarkus.datasource.reactive.max-size.pg@
%local.quarkus.hibernate-orm.database.generation=@quarkus.hibernate-orm.database.generation.pg@
%local.quarkus.datasource.jdbc.url=@quarkus.datasource.jdbc.url.pg@

%local.fakher=@fakher@
%dev.fakher=@fakher@
%test.fakher=@fakher@

# Optional dev Vault hookup (when VAULT_URL is provided)
%dev.quarkus.vault.url=${VAULT_URL:}
%dev.quarkus.vault.secret-config-kv-path=@vault.secret.config.path@
%dev.quarkus.vault.kv-secret-engine-mount-path=@vault.kv.mount.path@
%dev.quarkus.vault.authentication.client-token=${VAULT_TOKEN:}

# Production Vault integration
# Expected Vault KV v2 secret payload at: anipoll/service-template
# Example keys:
#   kind=postgresql
#   username=postgres
#   password=change-me
#   reactive-url=vertx-reactive:postgresql://postgres:5432/postgres
#   jdbc-url=jdbc:postgresql://postgres:5432/postgres
#   reactive-max-size=20
#   hibernate-generation=update
%prod.quarkus.vault.url=${VAULT_URL}
%prod.quarkus.vault.secret-config-kv-path=@vault.secret.config.path@
%prod.quarkus.vault.kv-secret-engine-mount-path=@vault.kv.mount.path@
%prod.quarkus.vault.secret-config-kv-path.db=@vault.secret.config.path@
%prod.quarkus.vault.authentication.kubernetes.role=@vault.kubernetes.role@

%prod.quarkus.datasource.db-kind=${db.kind:postgresql}
%prod.quarkus.datasource.username=${db.username}
%prod.quarkus.datasource.password=${db.password}
%prod.quarkus.datasource.reactive.url=${db.reactive-url}
%prod.quarkus.datasource.reactive.max-size=${db.reactive-max-size:20}
%prod.quarkus.hibernate-orm.database.generation=${db.hibernate-generation:update}
%prod.quarkus.datasource.jdbc.url=${db.jdbc-url}
